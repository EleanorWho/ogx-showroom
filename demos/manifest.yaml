# Manifest of runnable demos and tests
#
# Each entry specifies:
#   path: Relative path from project root
#   tags: List of tags for filtering (comma-separated or array)
#   name: Human-readable name
#   type: Execution type (python, shell, jupyter, etc.)
#   requires_key: Optional environment variable required to run
#
# Usage:
#   ./test.sh              # Run all demos
#   ./test.sh simple       # Run demos tagged 'simple'
#   ./test.sh rag,api      # Run demos tagged 'rag' OR 'api'
#   ./test.sh complex      # Run complex demos only

demos:
  - path: demos/hello/demo.py
    tags: [ci, fast, hello, basic]
    name: Hello World - Simple Chat Completion
    type: python
    description: Minimal example showing a single chat completion request

  - path: demos/notebooks/hello.ipynb
    tags: [ci, fast, hello, jupyter]
    name: Hello World - Jupyter Notebook
    type: jupyter
    description: Simple chat completion demo using Jupyter notebook

  - path: demos/notebooks/rag_demo.sh
    tags: [ci, rag, embeddings, jupyter, vector-store, end-to-end]
    name: RAG End-to-End Demo - Indexing + Inference
    type: shell
    description: Complete RAG workflow combining index building and retrieval-augmented generation with question answering

  - path: demos/rag/demo.py
    tags: [ci, rag, embeddings]
    name: RAG with Vector Search Demo
    type: python
    description: Demonstrates RAG with S3 file storage, embeddings, and vector search

  - path: demos/rag/demo_file_search.py
    tags: [ci, rag, file-search, responses]
    name: RAG with file_search + Responses API
    type: python
    description: Server-side RAG using OpenAI file_search tool with Responses API

  - path: demos/responses/demo.py
    tags: [ci, responses]
    name: OpenAI Responses API Demo
    type: python
    description: Verifies OpenAI SDK Responses API compatibility with multi-turn conversations

  - path: demos/tests/restarttest/restarttest.sh
    tags: [test, persistence, integration]
    name: Response Persistence Test
    type: shell
    description: Verifies response persistence across pod restarts (requires oc cluster access)

  - path: demos/multi_agent/demo.py
    tags: [ci, agents, rag, responses, mcp]
    name: Multi-Agent Research Assistant Demo
    type: python
    requires_key: SHOWROOM_OPENAI_API_KEY
    description: Multi-agent system with triage routing to RAG, repository query, and general knowledge agents

  - path: demos/tests/abac_isolation/demo.py
    tags: [test, abac, auth, security]
    name: ABAC Resource Isolation Test
    type: python
    description: Verifies ABAC ownership policies prevent cross-user resource access for vector stores, files, and responses

  - path: demos/conversations/demo.py
    tags: [ci, conversations, api]
    name: Conversations API Demo
    type: python
    description: Demonstrates conversation creation, multi-turn dialogue, and continuation testing
