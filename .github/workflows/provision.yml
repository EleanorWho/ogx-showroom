name: Showroom Validation

on:
  # SECURITY: pull_request_target is used so that secrets are available for fork
  # PRs. This means the PR's code runs with access to repo secrets. Before
  # approving a workflow run from an outside contributor, carefully review ALL
  # changes to action.yml, scripts/, and any other executable content for
  # potential secret exfiltration.
  pull_request_target:
    branches:
      - main
  workflow_dispatch:
    inputs:
      catalog_image:
        description: 'OLM catalog image (optional)'
        required: false
        type: string
      llama_stack_image:
        description: 'Llama Stack image (optional)'
        required: false
        type: string
      operator_image:
        description: 'Operator image (optional)'
        required: false
        type: string
jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: openshift-cluster-1
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup CI environment
        id: setup
        uses: ./
        with:
          catalog_image: ${{ inputs.catalog_image }}
          llama_stack_image: ${{ inputs.llama_stack_image }}
          operator_image: ${{ inputs.operator_image }}
          env: |
            SHOWROOM_PULL_SECRET=${{ secrets.SHOWROOM_PULL_SECRET }}
            SHOWROOM_VLLM_URL=https://llama-3-2-3b-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com:443/v1
            SHOWROOM_VLLM_API_TOKEN=${{ secrets.SHOWROOM_VLLM_API_TOKEN }}
            SHOWROOM_VLLM_EMBEDDING_URL=https://nomic-embed-text-v1-5-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com:443/v1
            SHOWROOM_VLLM_EMBEDDING_API_TOKEN=${{ secrets.SHOWROOM_VLLM_EMBEDDING_API_TOKEN }}

      - name: Login to OpenShift cluster
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}

      - name: Pre-flight cluster check
        run: |
          echo "Checking if cluster is clean..."

          MAX_WAIT=3600  # 1 hour in seconds
          INTERVAL=60    # Check every 60 seconds
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CLUSTER_CLEAN=true

            # Check for existing catalog
            if oc get catalogsource rhoai-catalog -n openshift-marketplace 2>/dev/null; then
              echo "⏳ rhoai-catalog exists - waiting for cleanup..."
              CLUSTER_CLEAN=false
            fi

            # Check for operator namespace
            if oc get namespace redhat-ods-operator 2>/dev/null; then
              echo "⏳ redhat-ods-operator namespace exists - waiting for cleanup..."
              CLUSTER_CLEAN=false
            fi

            # If cluster is clean, proceed
            if [ "$CLUSTER_CLEAN" = true ]; then
              echo "✓ Cluster is clean and ready"
              exit 0
            fi

            # Wait and retry
            echo "Cluster not clean. Waiting $INTERVAL seconds... (elapsed: ${ELAPSED}s / ${MAX_WAIT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Timeout reached
          echo "ERROR: Timeout waiting for cluster to be clean after $MAX_WAIT seconds"
          echo "Cluster may still be in use by another job or have orphaned resources"
          exit 1

      - name: Run setup.sh
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/setup.sh

      - name: Run provision.sh
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/provision.sh

      - name: Run RAG demo
        run: |
          # Wait for services to be fully ready
          echo "Waiting 15 seconds for services to stabilize..."
          sleep 15

          # Get route URLs
          LLAMASTACK_URL="https://$(oc get route llamastack-distribution -n redhat-ods-applications -o jsonpath='{.spec.host}')"
          KEYCLOAK_URL="https://$(oc get route keycloak -n redhat-ods-applications -o jsonpath='{.spec.host}')"

          # Run the demo with admin credentials
          python3 ${{ steps.setup.outputs.scripts_dir }}/scripts/rag-demo.py \
            "$LLAMASTACK_URL" \
            "$KEYCLOAK_URL" \
            admin \
            admin123

      - name: Run unprovision.sh
        if: always()
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/unprovision.sh

      - name: Run cleanup.sh
        if: always()
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/cleanup.sh
