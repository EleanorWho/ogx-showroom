name: Showroom Validation

on:
  # SECURITY: pull_request_target is used so that secrets are available for fork
  # PRs. This means the PR's code runs with access to repo secrets. Before
  # approving a workflow run from an outside contributor, carefully review ALL
  # changes to action.yml, scripts/, and any other executable content for
  # potential secret exfiltration.
  pull_request_target:
    branches:
      - main
  workflow_dispatch:
    inputs:
      catalog_image:
        description: 'OLM catalog image (optional)'
        required: false
        type: string
      llama_stack_image:
        description: 'Llama Stack image (optional)'
        required: false
        type: string
      operator_image:
        description: 'Operator image (optional)'
        required: false
        type: string
jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: openshift-cluster-1
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup CI environment
        id: setup
        uses: ./
        with:
          catalog_image: ${{ inputs.catalog_image }}
          llama_stack_image: ${{ inputs.llama_stack_image }}
          operator_image: ${{ inputs.operator_image }}
          oc_server: ${{ secrets.OC_SERVER }}
          oc_token: ${{ secrets.OC_TOKEN }}
          env: |
            SHOWROOM_PULL_SECRET=${{ secrets.SHOWROOM_PULL_SECRET }}
            SHOWROOM_VLLM_URL=https://llama-3-2-3b-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com:443/v1
            SHOWROOM_VLLM_API_TOKEN=${{ secrets.SHOWROOM_VLLM_API_TOKEN }}
            SHOWROOM_VLLM_EMBEDDING_URL=https://nomic-embed-text-v1-5-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com:443/v1
            SHOWROOM_VLLM_EMBEDDING_API_TOKEN=${{ secrets.SHOWROOM_VLLM_EMBEDDING_API_TOKEN }}
            SHOWROOM_OPENAI_API_KEY=${{ secrets.SHOWROOM_OPENAI_API_KEY }}

      - name: Run setup.sh
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/setup.sh

      - name: Apply RHOAI CRs
        run: |
          SCRIPTS=${{ steps.setup.outputs.scripts_dir }}
          oc apply -f $SCRIPTS/manifests/dscinitialization.yaml
          oc apply -f $SCRIPTS/manifests/datasciencecluster.yaml
          oc wait --for=jsonpath='{.status.phase}'=Ready datasciencecluster/default-dsc --timeout=600s

      - name: Helm install llama-stack-infra
        run: |
          helm upgrade --install llama-stack-infra ${{ steps.setup.outputs.scripts_dir }}/charts/llama-stack-infra \
            -n redhat-ods-applications --create-namespace --wait --timeout 10m

      - name: Helm install llama-stack-rhoai
        run: |
          SCRIPTS=${{ steps.setup.outputs.scripts_dir }}
          helm upgrade --install llama-stack-rhoai $SCRIPTS/charts/llama-stack-rhoai \
            -n redhat-ods-applications -f $SCRIPTS/values-local.yaml --wait --timeout 15m
          oc wait --for=jsonpath='{.status.phase}'=Ready llamastackdistribution/llamastack-distribution \
            -n redhat-ods-applications --timeout=600s

      - name: Run tests
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/test.sh

      - name: Debug - Capture OpenShift state
        if: always()
        run: |
          # WARNING: Only output to stdout (console). Secrets are auto-redacted in console output
          # but NOT in files/artifacts. Be careful what you log in the application itself.

          echo -e "\n=== Recent Events ==="
          oc get events -n redhat-ods-applications --sort-by='.lastTimestamp' \
            -o custom-columns=TIME:.lastTimestamp,TYPE:.type,REASON:.reason,OBJECT:.involvedObject.name,MESSAGE:.message

          echo -e "\n=== All Resources ==="
          oc get all -n redhat-ods-applications

          echo -e "\n=== Pod Logs (last 50 lines) ==="
          oc logs -n redhat-ods-applications --tail=-1 -l app=llama-stack || echo "No logs available"

      - name: Helm uninstall
        if: always()
        run: |
          SCRIPTS=${{ steps.setup.outputs.scripts_dir }}
          NS=redhat-ods-applications
          helm uninstall llama-stack-rhoai -n $NS --timeout 5m 2>/dev/null || true
          helm uninstall llama-stack-infra -n $NS --timeout 5m 2>/dev/null || true
          oc delete -f $SCRIPTS/manifests/datasciencecluster.yaml --timeout=120s 2>/dev/null || true
          oc delete -f $SCRIPTS/manifests/dscinitialization.yaml --timeout=120s 2>/dev/null || true
          oc delete job -l app.kubernetes.io/managed-by=Helm -n $NS 2>/dev/null || true

      - name: Run cleanup.sh
        if: always()
        run: |
          ${{ steps.setup.outputs.scripts_dir }}/cleanup.sh
