apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: redhat-ods-applications

resources:
- ../../base
- llamastackdistribution.yaml

# Generate ConfigMap from config.yaml
# This ConfigMap will be mounted by the LlamaStackDistribution
# Note: config.yaml is generated by provision.sh from config_base.yaml + config_abac.yaml.template
# disableNameSuffixHash prevents kustomize from adding a hash to the name
configMapGenerator:
- name: llamastack-config
  files:
  - config.yaml
  options:
    disableNameSuffixHash: true
