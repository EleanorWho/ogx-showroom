name: 'Setup CI Environment'
description: 'Sets up runner with container images and environment for CI jobs'
inputs:
  catalog_image:
    description: 'OLM catalog image'
    required: false
    default: ''
  llama_stack_image:
    description: 'LLS distro image (extracted from catalog if not provided)'
    required: false
    default: ''
  operator_image:
    description: 'Operator image (extracted from catalog if not provided)'
    required: false
    default: ''
  env:
    description: 'Environment variables in KEY=value format (multiline). Use this for secrets and config like SHOWROOM_PULL_SECRET, SHOWROOM_VLLM_URL, etc.'
    required: false
    default: ''
  oc_server:
    description: 'OpenShift server URL'
    required: false
    default: ''
  oc_token:
    description: 'OpenShift authentication token'
    required: false
    default: ''
outputs:
  scripts_dir:
    description: 'Directory containing provision.sh, test.sh, cleanup.sh'
    value: ${{ steps.showroom.outputs.scripts_dir }}
runs:
  using: 'composite'
  steps:
    - name: Install OpenShift CLI
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: "4.19.24"

    - name: Login to OpenShift cluster
      if: inputs.oc_server != '' && inputs.oc_token != ''
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server_url: ${{ inputs.oc_server }}
        openshift_token: ${{ inputs.oc_token }}

    - name: Prepare config file
      shell: bash
      env:
        CATALOG_IMAGE: ${{ inputs.catalog_image }}
        LLAMA_STACK_IMAGE: ${{ inputs.llama_stack_image }}
        OPERATOR_IMAGE: ${{ inputs.operator_image }}
        ENV_VARS: ${{ inputs.env }}
      run: |
        # Copy config.sh.example to ~/.lls_showroom (overwrite if exists)
        cp ${{ github.action_path }}/config.sh.example ~/.lls_showroom

        # Append action input parameters as exported env variables
        echo "" >> ~/.lls_showroom
        echo "# CI Configuration" >> ~/.lls_showroom

        if [ -n "$CATALOG_IMAGE" ]; then
          echo "export SHOWROOM_CATALOG_IMAGE=\"$CATALOG_IMAGE\"" >> ~/.lls_showroom
        fi

        if [ -n "$LLAMA_STACK_IMAGE" ]; then
          echo "export SHOWROOM_LLAMA_STACK_IMAGE=\"$LLAMA_STACK_IMAGE\"" >> ~/.lls_showroom
        fi

        if [ -n "$OPERATOR_IMAGE" ]; then
          echo "export SHOWROOM_OPERATOR_IMAGE=\"$OPERATOR_IMAGE\"" >> ~/.lls_showroom
        fi

        # Append environment variables (secrets and config)
        if [ -n "$ENV_VARS" ]; then
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "export $line" >> ~/.lls_showroom
            fi
          done <<< "$ENV_VARS"
        fi

    - name: Pre-flight cluster check
      if: inputs.oc_server != '' && inputs.oc_token != ''
      shell: bash
      run: |
        echo "Checking if cluster is clean..."

        MAX_WAIT=300  # 5 minutes
        INTERVAL=30    # Check every 30 seconds
        ELAPSED=0

        while [ $ELAPSED -lt $MAX_WAIT ]; do
          CLUSTER_CLEAN=true

          # Check for existing catalog
          if oc get catalogsource rhoai-catalog -n openshift-marketplace 2>/dev/null; then
            echo "⏳ rhoai-catalog exists - waiting for cleanup..."
            CLUSTER_CLEAN=false
          fi

          # Check for operator namespace
          if oc get namespace redhat-ods-operator 2>/dev/null; then
            echo "⏳ redhat-ods-operator namespace exists - waiting for cleanup..."
            CLUSTER_CLEAN=false
          fi

          # If cluster is clean, proceed
          if [ "$CLUSTER_CLEAN" = true ]; then
            echo "✓ Cluster is clean and ready"
            exit 0
          fi

          # Wait and retry
          echo "Cluster not clean. Waiting $INTERVAL seconds... (elapsed: ${ELAPSED}s / ${MAX_WAIT}s)"
          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        # Timeout reached
        echo "ERROR: Timeout waiting for cluster to be clean after $MAX_WAIT seconds"
        echo "Cluster may still be in use by another job or have orphaned resources"
        exit 1

    - name: Save action_path
      id: showroom
      shell: bash
      run: |
        echo "scripts_dir=${{ github.action_path }}" >> $GITHUB_OUTPUT
