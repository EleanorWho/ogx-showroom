apiVersion: v2
name: ogx-infra
description: Supporting infrastructure services for OGX (postgres, etcd, milvus, minio, keycloak)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgres
    version: 0.1.0
    condition: postgres.enabled
  - name: etcd
    version: 0.1.0
    condition: etcd.enabled
  - name: milvus
    version: 0.1.0
    condition: milvus.enabled
  - name: minio
    version: 0.1.0
    condition: minio.enabled
  - name: keycloak
    version: 0.1.0
    condition: keycloak.enabled
  - name: otel-collector
    version: 0.1.0
    condition: otel-collector.enabled
  - name: prometheus
    version: 0.1.0
    condition: prometheus.enabled
  - name: grafana
    version: 0.1.0
    condition: grafana.enabled
  - name: jaeger
    version: 0.1.0
    condition: jaeger.enabled
