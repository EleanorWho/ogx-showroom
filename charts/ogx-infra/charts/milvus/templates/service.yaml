apiVersion: v1
kind: Service
metadata:
  name: milvus
  labels:
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 19530
      targetPort: 19530
      protocol: TCP
      name: grpc
    - port: 9091
      targetPort: 9091
      protocol: TCP
      name: metrics
  selector:
    {{- include "milvus.selectorLabels" . | nindent 4 }}
