apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: etcd-allow-ingress
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "etcd.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 2379
          protocol: TCP
