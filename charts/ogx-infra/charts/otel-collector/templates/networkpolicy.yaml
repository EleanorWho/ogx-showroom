apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector-allow-ingress
  labels:
    {{- include "otel-collector.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "otel-collector.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.ports.otlpGrpc }}
          protocol: TCP
        - port: {{ .Values.ports.otlpHttp }}
          protocol: TCP
        - port: {{ .Values.global.otelCollectorPrometheusPort }}
          protocol: TCP
