apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    {{- include "otel-collector.labels" . | nindent 4 }}
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.ports.otlpGrpc }}
          http:
            endpoint: 0.0.0.0:{{ .Values.ports.otlpHttp }}
    exporters:
      prometheus:
        endpoint: 0.0.0.0:{{ .Values.global.otelCollectorPrometheusPort }}
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          exporters: [otlp/jaeger]
