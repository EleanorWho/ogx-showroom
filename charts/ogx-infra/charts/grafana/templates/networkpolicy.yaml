apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-allow-ingress
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "grafana.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: {{ .Values.port }}
          protocol: TCP
