apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ogx
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  ogx-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "reqps", "custom": {"fillOpacity": 20}},
            "overrides": []
          },
          "targets": [{
            "expr": "sum(rate(ogx_requests_total[5m])) by (api)",
            "legendFormat": "{{`{{api}}`}}",
            "refId": "A"
          }]
        },
        {
          "title": "Concurrent Requests",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short", "custom": {"fillOpacity": 20}},
            "overrides": []
          },
          "targets": [{
            "expr": "sum(ogx_concurrent_requests) by (api)",
            "legendFormat": "{{`{{api}}`}}",
            "refId": "A"
          }]
        },
        {
          "title": "Request Duration (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "s", "custom": {"fillOpacity": 10}},
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(ogx_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(ogx_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(ogx_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Requests by Status",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "reqps", "custom": {"fillOpacity": 20}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "error"}, "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]}
            ]
          },
          "targets": [{
            "expr": "sum(rate(ogx_requests_total[5m])) by (status)",
            "legendFormat": "{{`{{status}}`}}",
            "refId": "A"
          }]
        },
        {
          "title": "Inference Duration by Model (p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "s", "custom": {"fillOpacity": 10}},
            "overrides": []
          },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(ogx_inference_duration_seconds_bucket[5m])) by (le, model))",
            "legendFormat": "{{`{{model}}`}}",
            "refId": "A"
          }]
        },
        {
          "title": "Tokens per Second by Model",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short", "custom": {"fillOpacity": 10}},
            "overrides": []
          },
          "targets": [{
            "expr": "histogram_quantile(0.50, sum(rate(ogx_inference_tokens_per_second_bucket[5m])) by (le, model))",
            "legendFormat": "{{`{{model}}`}} p50",
            "refId": "A"
          }]
        },
        {
          "title": "Vector IO Operations",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "ops", "custom": {"fillOpacity": 20}},
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(ogx_vector_io_inserts_total[5m]))",
              "legendFormat": "inserts",
              "refId": "A"
            },
            {
              "expr": "sum(rate(ogx_vector_io_chunks_processed_total[5m]))",
              "legendFormat": "chunks processed",
              "refId": "B"
            }
          ]
        },
        {
          "title": "Vector IO Insert Duration (p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "s", "custom": {"fillOpacity": 10}},
            "overrides": []
          },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(ogx_vector_io_insert_duration_seconds_bucket[5m])) by (le))",
            "legendFormat": "p95",
            "refId": "A"
          }]
        },
        {
          "title": "Total Requests",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 32},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [{
            "expr": "sum(ogx_requests_total)",
            "refId": "A"
          }]
        },
        {
          "title": "Error Rate",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 32},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.05}]}}},
          "targets": [{
            "expr": "sum(rate(ogx_requests_total{status=\"error\"}[5m])) / sum(rate(ogx_requests_total[5m]))",
            "refId": "A"
          }]
        },
        {
          "title": "Vector Stores Created",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 32},
          "datasource": {"type": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [{
            "expr": "sum(ogx_vector_io_stores_total)",
            "refId": "A"
          }]
        }
      ],
      "schemaVersion": 39,
      "tags": ["ogx"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "OGX Overview",
      "uid": "ogx-overview"
    }
