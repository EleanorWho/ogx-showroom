image:
  repository: quay.io/jaegertracing/jaeger
  tag: "2.4.0"
  pullPolicy: IfNotPresent

ports:
  ui: 16686
  otlpGrpc: 4317

route:
  # Jaeger UI has no authentication - enabling exposes traces publicly
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
