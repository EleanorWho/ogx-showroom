apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-allow-ingress
  labels:
    {{- include "minio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "minio.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 9000
          protocol: TCP
        - port: 9001
          protocol: TCP
