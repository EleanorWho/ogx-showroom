{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llamastack-allow-ingress
  labels:
    {{- include "llama-stack-rhoai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: llama-stack
      app.kubernetes.io/instance: {{ .Values.llamastack.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: {{ .Values.llamastack.port }}
          protocol: TCP
{{- end }}
