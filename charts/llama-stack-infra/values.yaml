postgres:
  enabled: true
  image:
    repository: registry.redhat.io/rhel9/postgresql-15
    tag: latest
  auth:
    username: llamastack
    database: llamastack
    password: ""
    existingSecret: ""
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

etcd:
  enabled: true
  image:
    repository: quay.io/coreos/etcd
    tag: v3.5.25
  persistence:
    size: 2Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

milvus:
  enabled: true
  image:
    repository: quay.io/rh-aiservices-bu/milvus-openshift
    tag: v2.6.15-multiarch
  persistence:
    size: 10Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

minio:
  enabled: true
  image:
    repository: cgr.dev/chainguard/minio
    tag: latest
  auth:
    rootUser: minioadmin
    rootPassword: ""
    existingSecret: ""
  persistence:
    size: 20Gi
  route:
    enabled: true
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: 26.0.0
  auth:
    adminPassword: ""
    clientSecret: ""
    demoAdminPassword: ""
    demoUserPassword: ""
  route:
    enabled: true
  setup:
    enabled: true
    image:
      repository: registry.redhat.io/ubi9/python-311
      tag: latest
    backoffLimit: 5
