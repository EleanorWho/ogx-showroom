{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "keycloak.secretName" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.secretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if $existing }}
  KEYCLOAK_ADMIN_PASSWORD: {{ index $existing.data "KEYCLOAK_ADMIN_PASSWORD" }}
  KEYCLOAK_CLIENT_SECRET: {{ index $existing.data "KEYCLOAK_CLIENT_SECRET" }}
  KEYCLOAK_PASSWORD: {{ index $existing.data "KEYCLOAK_PASSWORD" }}
  KEYCLOAK_DEMO_PASSWORD: {{ index $existing.data "KEYCLOAK_DEMO_PASSWORD" }}
  {{- else }}
  KEYCLOAK_ADMIN_PASSWORD: {{ (.Values.auth.adminPassword | default (randAlphaNum 16)) | b64enc }}
  KEYCLOAK_CLIENT_SECRET: {{ (.Values.auth.clientSecret | default (randAlphaNum 32)) | b64enc }}
  KEYCLOAK_PASSWORD: {{ (.Values.auth.demoAdminPassword | default (randAlphaNum 12)) | b64enc }}
  KEYCLOAK_DEMO_PASSWORD: {{ (.Values.auth.demoUserPassword | default (randAlphaNum 12)) | b64enc }}
  {{- end }}
