apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: milvus-allow-ingress
  labels:
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "milvus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 19530
          protocol: TCP
        - port: 9091
          protocol: TCP
