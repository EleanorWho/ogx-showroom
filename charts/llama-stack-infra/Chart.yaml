apiVersion: v2
name: llama-stack-infra
description: Supporting infrastructure services for LlamaStack (postgres, etcd, milvus, minio, keycloak)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgres
    version: 0.1.0
    condition: postgres.enabled
  - name: etcd
    version: 0.1.0
    condition: etcd.enabled
  - name: milvus
    version: 0.1.0
    condition: milvus.enabled
  - name: minio
    version: 0.1.0
    condition: minio.enabled
  - name: keycloak
    version: 0.1.0
    condition: keycloak.enabled
