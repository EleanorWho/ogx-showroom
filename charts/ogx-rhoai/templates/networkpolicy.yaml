{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ogx-allow-ingress
  labels:
    {{- include "ogx-rhoai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: ogx
      app.kubernetes.io/instance: {{ .Values.ogx.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: {{ .Values.ogx.port }}
          protocol: TCP
{{- end }}
