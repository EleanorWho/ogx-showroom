{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.ogx.name }}
  labels:
    app: {{ .Values.ogx.name }}
    {{- include "ogx-rhoai.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ .Values.ogx.name }}-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
